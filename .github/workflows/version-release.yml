name: Version Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest GitHub release
        id: get_release
        run: |
          response=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)

          if echo "$response" | grep -q "Not Found"; then
            latest_tag="v0"
          else
            latest_tag=$(echo "$response" | jq -r '.tag_name')
          fi

          echo "Latest release tag: $latest_tag"
          echo "tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Increment version
        id: bump
        run: |
          latest=${{ steps.get_release.outputs.tag }}
          num=${latest#v}
          new=$((num + 1))
          new_tag="v$new"

          echo "New tag: $new_tag"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Create source zip
        id: zip
        run: |
          repo_name=$(basename $GITHUB_REPOSITORY)
          zip_name="${repo_name}-${{ steps.bump.outputs.new_tag }}.zip"

          # Zip only source files (exclude .git, GitHub workflows, docs, etc.)
          zip -r "$zip_name" . \
            -x "*.git*" \
            -x ".github/*" \
            -x "docs/*" \
            -x "*.DS_Store"

          echo "zip_name=$zip_name" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: Release ${{ steps.bump.outputs.new_tag }}
          body: |
            Automated release for ${{ steps.bump.outputs.new_tag }}
          files: ${{ steps.zip.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
